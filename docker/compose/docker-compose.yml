version: "3.9"

services:

  mysql:
    image: mysql:latest
    ports:
      - "3306:3306"
    volumes:
      - /data/mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
    networks:
      - appnet

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - /data/redis:/data
    command: redis-server --appendonly yes
    networks:
      - appnet

  vllm:
    image: vllm2:latest
    ports:
      - "8000:8000"
    volumes:
      - /data/models/qwen2.5-7b:/model
    command: >
      --model /model
      --host 0.0.0.0
      --port 8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    networks:
      - appnet

  fastapi:
    build:
      context: /data/fastapi_code
      dockerfile: Dockerfile
    volumes:
    - /data/fastapi_code:/app
    - /data/models/bge_large:/app/models/bge_large
    - /data/models/jina-reranker:/app/models/jina-reranker
    - /data/docker/compose/.env:/app/.env
    container_name: fastapi
    ports:
      - "8001:8001"
    depends_on:
      - vllm
    networks:
      - appnet
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
  
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - /data/qdrant:/qdrant/storage
    networks:
      - appnet
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    container_name: neo4j
    restart: always

    ports:
      - "7474:7474"
      - "7687:7687"

    environment:
      NEO4J_AUTH: neo4j/password123

    volumes:
      - /data/neo4j/data:/data
      - /data/neo4j/logs:/logs
      - /data/neo4j/plugins:/plugins

    networks:
      - appnet

networks:
  appnet:
    driver: bridge


